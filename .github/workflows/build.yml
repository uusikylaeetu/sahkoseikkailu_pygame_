name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  APP_NAME: Sahkoseikkailu
  MAIN_SCRIPT: sahkoseikkailu_pygame.py
  PYTHON_VERSION: "3.12"

jobs:
  build-macos-intel:
    name: macOS Intel
    runs-on: macos-15-intel
    timeout-minutes: 30

    steps:
      - name: Hae lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame pyinstaller

      - name: Tarkista lähdekoodi
        run: |
          python -m py_compile "$MAIN_SCRIPT" elektroniikka.py
          SDL_VIDEODRIVER=dummy python "$MAIN_SCRIPT" --self-test

      - name: Rakenna macOS Intel -sovellus
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --hidden-import=elektroniikka \
            --name "$APP_NAME" \
            "$MAIN_SCRIPT"

      - name: Testaa valmis sovellus
        run: |
          SDL_VIDEODRIVER=dummy "dist/$APP_NAME.app/Contents/MacOS/$APP_NAME" --self-test

      - name: Pakkaa DMG-levykuvaksi
        run: |
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "dist/$APP_NAME.app" \
            -ov \
            -format UDZO \
            "$APP_NAME-macOS-Intel.dmg"

      - name: Tallenna artefakti
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: ${{ env.APP_NAME }}-macOS-Intel.dmg
          if-no-files-found: error
          retention-days: 14

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Hae lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame pyinstaller

      - name: Tarkista lähdekoodi
        run: |
          python -m py_compile "$MAIN_SCRIPT" elektroniikka.py
          SDL_VIDEODRIVER=dummy python "$MAIN_SCRIPT" --self-test

      - name: Rakenna macOS Apple Silicon -sovellus
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --hidden-import=elektroniikka \
            --name "$APP_NAME" \
            "$MAIN_SCRIPT"

      - name: Testaa valmis sovellus
        run: |
          SDL_VIDEODRIVER=dummy "dist/$APP_NAME.app/Contents/MacOS/$APP_NAME" --self-test

      - name: Pakkaa DMG-levykuvaksi
        run: |
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "dist/$APP_NAME.app" \
            -ov \
            -format UDZO \
            "$APP_NAME-macOS-AppleSilicon.dmg"

      - name: Tallenna artefakti
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: ${{ env.APP_NAME }}-macOS-AppleSilicon.dmg
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Hae lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Asenna riippuvuudet
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame pyinstaller

      - name: Tarkista lähdekoodi
        shell: pwsh
        run: |
          python -m py_compile $env:MAIN_SCRIPT elektroniikka.py
          $env:SDL_VIDEODRIVER = "dummy"
          python $env:MAIN_SCRIPT --self-test

      - name: Rakenna Windows-sovellus
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --hidden-import=elektroniikka `
            --name $env:APP_NAME `
            $env:MAIN_SCRIPT

      - name: Testaa valmis sovellus
        shell: pwsh
        run: |
          $env:SDL_VIDEODRIVER = "dummy"
          & "dist\$env:APP_NAME\$env:APP_NAME.exe" --self-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Pakkaa ZIP-arkistoksi
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\$env:APP_NAME" -DestinationPath "$env:APP_NAME-Windows.zip"

      - name: Tallenna artefakti
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ env.APP_NAME }}-Windows.zip
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Hae lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Asenna järjestelmäriippuvuudet
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 \
            libsdl2-image-2.0-0 \
            libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 \
            zip

      - name: Asenna Python-riippuvuudet
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame pyinstaller

      - name: Tarkista lähdekoodi
        run: |
          python -m py_compile "$MAIN_SCRIPT" elektroniikka.py
          SDL_VIDEODRIVER=dummy python "$MAIN_SCRIPT" --self-test

      - name: Rakenna Linux-sovellus
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --hidden-import=elektroniikka \
            --name "$APP_NAME" \
            "$MAIN_SCRIPT"

      - name: Testaa valmis sovellus
        run: |
          SDL_VIDEODRIVER=dummy "dist/$APP_NAME/$APP_NAME" --self-test

      - name: Pakkaa ZIP-arkistoksi
        run: |
          cd dist
          zip -r "../$APP_NAME-Linux.zip" "$APP_NAME"

      - name: Tallenna artefakti
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ${{ env.APP_NAME }}-Linux.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Julkaise GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos-intel
      - build-macos-arm
      - build-windows
      - build-linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Lataa rakennetut artefaktit
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Luo SHA-256-tarkistussummat
        run: |
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Julkaise GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/macos-intel/Sahkoseikkailu-macOS-Intel.dmg
            artifacts/macos-arm/Sahkoseikkailu-macOS-AppleSilicon.dmg
            artifacts/windows/Sahkoseikkailu-Windows.zip
            artifacts/linux/Sahkoseikkailu-Linux.zip
            SHA256SUMS.txt
