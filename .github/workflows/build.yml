name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  # ── macOS (Intel x86_64) ──────────────────────────────────────────────────
  build-macos-intel:
    runs-on: macos-13          # last Intel runner on GitHub Actions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna riippuvuudet
        run: pip install pygame pyinstaller

      - name: Rakenna macOS Intel -versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --add-data=elektroniikka.py:.
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Pakkaa .app DMG-levykuvaksi
        run: |
          hdiutil create -volname Sahkoseikkailu \
            -srcfolder dist/Sahkoseikkailu.app \
            -ov -format UDZO \
            Sahkoseikkailu-macOS-Intel.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: Sahkoseikkailu-macOS-Intel.dmg

  # ── macOS (Apple Silicon arm64) ───────────────────────────────────────────
  build-macos-arm:
    runs-on: macos-14          # M1/M2 runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna riippuvuudet
        run: pip install pygame pyinstaller

      - name: Rakenna macOS Apple Silicon -versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --add-data=elektroniikka.py:.
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Pakkaa .app DMG-levykuvaksi
        run: |
          hdiutil create -volname Sahkoseikkailu \
            -srcfolder dist/Sahkoseikkailu.app \
            -ov -format UDZO \
            Sahkoseikkailu-macOS-AppleSilicon.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: Sahkoseikkailu-macOS-AppleSilicon.dmg

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna riippuvuudet
        run: pip install pygame pyinstaller

      - name: Rakenna Windows-versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --add-data=elektroniikka.py;.
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Pakkaa ZIP-arkistoksi
        run: Compress-Archive -Path dist\Sahkoseikkailu -DestinationPath Sahkoseikkailu-Windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: Sahkoseikkailu-Windows.zip

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Asenna SDL2-kirjastot ja Python-riippuvuudet
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install pygame pyinstaller

      - name: Rakenna Linux-versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --add-data=elektroniikka.py:.
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Pakkaa ZIP-arkistoksi
        run: zip -r Sahkoseikkailu-Linux.zip dist/Sahkoseikkailu

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: Sahkoseikkailu-Linux.zip

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    needs: [build-macos-intel, build-macos-arm, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Julkaise GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-intel/Sahkoseikkailu-macOS-Intel.dmg
            artifacts/macos-arm/Sahkoseikkailu-macOS-AppleSilicon.dmg
            artifacts/windows/Sahkoseikkailu-Windows.zip
            artifacts/linux/Sahkoseikkailu-Linux.zip
          generate_release_notes: true
