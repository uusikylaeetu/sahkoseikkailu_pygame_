name: Build Sahkoseikkailu

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Lataa lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Asenna rakennustyökalut
        run: python -m pip install --upgrade pip pyinstaller pygame

      - name: Rakenna Windows-versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --onefile
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Nimeä Windows-versio
        shell: pwsh
        run: Copy-Item "dist/Sahkoseikkailu.exe" "Sahkoseikkailu-Windows.exe"

      - name: Tallenna Windows-versio
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: Sahkoseikkailu-Windows.exe
          if-no-files-found: error

  linux:
    name: Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Lataa lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Asenna rakennustyökalut
        run: python -m pip install --upgrade pip pyinstaller pygame

      - name: Rakenna Linux-versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --onefile
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Pakkaa Linux-versio
        run: |
          chmod +x dist/Sahkoseikkailu
          tar -C dist -czf Sahkoseikkailu-Linux-x64.tar.gz Sahkoseikkailu

      - name: Tallenna Linux-versio
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: Sahkoseikkailu-Linux-x64.tar.gz
          if-no-files-found: error

  macos-apple:
    name: macOS Apple Silicon
    runs-on: macos-15

    steps:
      - name: Lataa lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Asenna rakennustyökalut
        run: python -m pip install --upgrade pip pyinstaller pygame

      - name: Rakenna macOS-versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Tee Apple Silicon DMG
        run: |
          mkdir dmg-root
          cp -R dist/Sahkoseikkailu.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "Sahkoseikkailu" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            Sahkoseikkailu-macOS-Apple-Silicon.dmg

      - name: Tallenna Apple Silicon -versio
        uses: actions/upload-artifact@v4
        with:
          name: macos-apple
          path: Sahkoseikkailu-macOS-Apple-Silicon.dmg
          if-no-files-found: error

  macos-intel:
    name: macOS Intel
    runs-on: macos-15-intel

    steps:
      - name: Lataa lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Asenna rakennustyökalut
        run: python -m pip install --upgrade pip pyinstaller pygame

      - name: Rakenna macOS-versio
        run: >
          pyinstaller
          --noconfirm
          --clean
          --hidden-import=elektroniikka
          --windowed
          --name Sahkoseikkailu
          sahkoseikkailu_pygame.py

      - name: Tee Intel DMG
        run: |
          mkdir dmg-root
          cp -R dist/Sahkoseikkailu.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "Sahkoseikkailu" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            Sahkoseikkailu-macOS-Intel.dmg

      - name: Tallenna Intel-versio
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: Sahkoseikkailu-macOS-Intel.dmg
          if-no-files-found: error

  release:
    name: Liitä ohjelmat julkaisuun
    needs:
      - windows
      - linux
      - macos-apple
      - macos-intel

    runs-on: ubuntu-latest

    steps:
      - name: Lataa rakennetut ohjelmat
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Liitä ohjelmat GitHub Releaseen
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/Sahkoseikkailu-Windows.exe
            release-files/Sahkoseikkailu-Linux-x64.tar.gz
            release-files/Sahkoseikkailu-macOS-Apple-Silicon.dmg
            release-files/Sahkoseikkailu-macOS-Intel.dmg
